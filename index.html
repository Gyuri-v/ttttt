<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
* {box-sizing: border-box;margin: 0;padding: 0;}
body { background-color: #f0f0f0; min-height: 100vh; }
#wrap {display: flex;flex-direction: column;height: 100vh;}
header {background-color: #333;color: #fff;padding: 20px;text-align: center;}
nav {background-color: #333;color: #fff;padding: 20px;text-align: center;}
nav ul {list-style: none;display: flex;justify-content: center;}
nav ul li {margin: 0 10px;}
nav ul li a {color: #fff;text-decoration: none;}
footer {background-color: #333;color: #fff;padding: 20px;text-align: center;}
footer p {color: #fff;}
.layout{ width: 100%; border: 2px solid red; }
</style>
</head>
<body>
<div id="wrap">
	<div class="layout"></div>
</div>
</body>
<script>
	const ah = window.innerHeight;
	document.querySelector('.layout').style.height = ah + 'px';
</script>
</html>
